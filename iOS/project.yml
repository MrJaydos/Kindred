name: Kindred
options:
  bundleIdPrefix: com.kindred
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  Kindred:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Kindred
    resources:
      - path: Kindred/Config
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kindred.app
        INFOPLIST_FILE: Kindred/Info.plist
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
    dependencies: []

  KindredTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: KindredTests
    dependencies:
      - target: Kindred
